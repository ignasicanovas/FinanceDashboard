version: '3.9'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8080"
    environment:
      APP_ENV: development
      SECRET_KEY: dev-secret-change-in-production
      GCS_BUCKET: ${GCS_BUCKET:-finanzas-n26-data}
      DB_BLOB: finanzas.db
      DB_LOCAL_CACHE_DIR: /tmp
      # LOCAL_ONLY=true omite GCS (útil sin credenciales ADC)
      LOCAL_ONLY: ${LOCAL_ONLY:-false}
      ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://localhost:8080"]'
    volumes:
      - ./backend:/app                              # Hot reload en desarrollo
      - ~/.config/gcloud:/root/.config/gcloud:ro    # ADC para GCS
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""  # vacío = usa el proxy de nginx/vite
    ports:
      - "8080:8080"
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080
