server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolver needed for dynamic proxy_pass to HTTPS upstream in Cloud Run
    resolver 8.8.8.8 valid=30s;

    location /api/ {
        # Use a variable so nginx resolves DNS at request time (not just at startup)
        # proxy_pass with variable: nginx appends the full request URI, so no /api/ suffix needed
        set $backend "${BACKEND_URL}";
        proxy_pass $backend;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Required for HTTPS upstream with SNI
        proxy_ssl_server_name on;
    }

    # SPA fallback — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
