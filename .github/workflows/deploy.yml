name: CI / Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: finance-tracker-489508
  REGION: europe-west1
  BACKEND_SERVICE: finanzas-backend
  FRONTEND_SERVICE: finanzas-frontend
  SA_EMAIL: finanzas-sa@finance-tracker-489508.iam.gserviceaccount.com
  BACKEND_URL: https://finanzas-backend-zwaapqlglq-ew.a.run.app
  FRONTEND_URL: https://finanzas-frontend-zwaapqlglq-ew.a.run.app

jobs:
  # ── 1. Type-check ──────────────────────────────────────────────────────────
  lint:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: tsc --noEmit
        run: npx tsc --noEmit
        working-directory: frontend

  # ── 2. Frontend tests (Vitest) ─────────────────────────────────────────────
  test-frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Vitest
        run: npm test
        working-directory: frontend

  # ── 3. Backend tests (pytest) ──────────────────────────────────────────────
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt
        working-directory: backend

      - name: Run pytest
        run: pytest tests/ -v
        working-directory: backend
        env:
          LOCAL_ONLY: 'true'
          SECRET_KEY: ci-test-secret-not-for-production
          GCS_BUCKET: test-bucket
          DB_BLOB: test.db
          DB_LOCAL_CACHE_DIR: /tmp
          APP_ENV: development

  # ── 4. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: [lint, test-frontend, test-backend]
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Enable required APIs
        run: |
          gcloud services enable \
            run.googleapis.com \
            cloudbuild.googleapis.com \
            artifactregistry.googleapis.com \
            secretmanager.googleapis.com \
            --quiet

      - name: Deploy backend
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --source ./backend \
            --region $REGION \
            --project $PROJECT_ID \
            --service-account $SA_EMAIL \
            --set-secrets "SECRET_KEY=finanzas-secret-key:latest" \
            --set-env-vars "GCS_BUCKET=finanzas-n26-data,APP_ENV=production,ALLOWED_ORIGINS=[\"$FRONTEND_URL\"]" \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --quiet

      - name: Deploy frontend
        run: |
          gcloud run deploy $FRONTEND_SERVICE \
            --source ./frontend \
            --region $REGION \
            --project $PROJECT_ID \
            --set-env-vars "BACKEND_URL=$BACKEND_URL" \
            --allow-unauthenticated \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --quiet

      - name: Job summary
        run: |
          echo "### Despliegue completado :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Servicio | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | $FRONTEND_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | $BACKEND_URL |" >> $GITHUB_STEP_SUMMARY
